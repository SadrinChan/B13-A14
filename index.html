<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    
    <div class="max-w-4xl mx-auto p-4 md:p-8">
        
        <h1 class="text-2xl md:text-3xl font-bold mb-6 md:mb-8">Job Application Tracker</h1>
        
        <div class="grid grid-cols-3 gap-3 md:gap-4 mb-6 md:mb-8">
            <div class="bg-white p-4 md:p-6 rounded shadow border">
                <p class="text-xs md:text-sm text-gray-600 mb-1 md:mb-2">Total</p>
                <p id="total-count" class="text-2xl md:text-3xl font-bold">8</p>
            </div>
            <div class="bg-white p-4 md:p-6 rounded shadow border">
                <p class="text-xs md:text-sm text-gray-600 mb-1 md:mb-2">Interview</p>
                <p id="interview-count" class="text-2xl md:text-3xl font-bold text-green-500">0</p>
            </div>
            <div class="bg-white p-4 md:p-6 rounded shadow border">
                <p class="text-xs md:text-sm text-gray-600 mb-1 md:mb-2">Rejected</p>
                <p id="rejected-count" class="text-2xl md:text-3xl font-bold text-red-500">0</p>
            </div>
        </div>

        <hr class="mb-6 md:mb-8">

        <div class="flex justify-between items-center mb-4 md:mb-6">
            <h2 class="text-lg md:text-xl font-bold">Available Jobs</h2>
            <p class="text-sm md:text-base text-gray-600"><span id="jobs-count">8</span> jobs</p>
        </div>

        <div class="flex gap-2 mb-6">
            <button id="btn-all" class="px-4 md:px-6 py-2 bg-blue-500 text-white rounded font-bold text-xs md:text-sm">All</button>
            <button id="btn-interview" class="px-4 md:px-6 py-2 bg-white border rounded font-bold text-xs md:text-sm">Interview</button>
            <button id="btn-rejected" class="px-4 md:px-6 py-2 bg-white border rounded font-bold text-xs md:text-sm">Rejected</button>
        </div>

        <div id="jobs-container"></div>

    </div>
