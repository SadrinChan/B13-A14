<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    
    <div class="max-w-4xl mx-auto p-8">
        
        <!-- Header -->
        <h1 class="text-3xl font-bold mb-8">Job Application Tracker</h1>
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded shadow border">
                <p class="text-sm text-gray-600 mb-2">Total</p>
                <p id="total-count" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-white p-6 rounded shadow border">
                <p class="text-sm text-gray-600 mb-2">Interview</p>
                <p id="interview-count" class="text-3xl font-bold text-green-500">0</p>
            </div>
            <div class="bg-white p-6 rounded shadow border">
                <p class="text-sm text-gray-600 mb-2">Rejected</p>
                <p id="rejected-count" class="text-3xl font-bold text-red-500">0</p>
            </div>
        </div>

        <hr class="mb-8">

        <!-- Available Jobs Header -->
        <div class="flex justify-between mb-6">
            <h2 class="text-xl font-bold">Available Jobs</h2>
            <p class="text-gray-600"><span id="jobs-count">0</span> jobs</p>
        </div>

        <!-- Filter Tabs -->
        <div class="flex gap-2 mb-6">
            <button id="btn-all" class="px-6 py-2 bg-blue-500 text-white rounded font-bold">All</button>
            <button id="btn-interview" class="px-6 py-2 bg-white border rounded font-bold">Interview</button>
            <button id="btn-rejected" class="px-6 py-2 bg-white border rounded font-bold">Rejected</button>
        </div>

        <!-- Jobs Container -->
        <div id="jobs-container"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
