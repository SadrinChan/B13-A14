<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    
    <div class="max-w-4xl mx-auto p-4 md:p-8">
        
        <h1 class="text-2xl md:text-3xl font-bold mb-6 md:mb-8">Job Application Tracker</h1>
        
        <div class="grid grid-cols-3 gap-3 md:gap-4 mb-6 md:mb-8">
            <div class="bg-white p-4 md:p-6 rounded shadow border">
                <p class="text-xs md:text-sm text-gray-600 mb-1 md:mb-2">Total</p>
                <p id="total-count" class="text-2xl md:text-3xl font-bold">8</p>
            </div>
            <div class="bg-white p-4 md:p-6 rounded shadow border">
                <p class="text-xs md:text-sm text-gray-600 mb-1 md:mb-2">Interview</p>
                <p id="interview-count" class="text-2xl md:text-3xl font-bold text-green-500">0</p>
            </div>
            <div class="bg-white p-4 md:p-6 rounded shadow border">
                <p class="text-xs md:text-sm text-gray-600 mb-1 md:mb-2">Rejected</p>
                <p id="rejected-count" class="text-2xl md:text-3xl font-bold text-red-500">0</p>
            </div>
        </div>

        <hr class="mb-6 md:mb-8">

        <div class="flex justify-between items-center mb-4 md:mb-6">
            <h2 class="text-lg md:text-xl font-bold">Available Jobs</h2>
            <p class="text-sm md:text-base text-gray-600"><span id="jobs-count">8</span> jobs</p>
        </div>

        <div class="flex gap-2 mb-6">
            <button id="btn-all" class="px-4 md:px-6 py-2 bg-blue-500 text-white rounded font-bold text-xs md:text-sm">All</button>
            <button id="btn-interview" class="px-4 md:px-6 py-2 bg-white border rounded font-bold text-xs md:text-sm">Interview</button>
            <button id="btn-rejected" class="px-4 md:px-6 py-2 bg-white border rounded font-bold text-xs md:text-sm">Rejected</button>
        </div>

        <div id="jobs-container"></div>

    </div>

    <script>
const jobs = [
    {id: 1, company: "Mobile First Corp", position: "React Native Developer", location: "Remote", type: "Full-time", salary: "$130,000 - $175,000", description: "Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.", status: "not-applied"},
    {id: 2, company: "WebFlow Agency", position: "Web Designer & Developer", location: "Los Angeles, CA", type: "Part-time", salary: "$80,000 - $120,000", description: "Create stunning web experiences for high-profile clients. Must have portfolio and experience with modern web design trends.", status: "not-applied"},
    {id: 3, company: "DataViz Solutions", position: "Data Visualization Specialist", location: "Boston, MA", type: "Full-time", salary: "$125,000 - $165,000", description: "Transform complex data into compelling visualizations. Required skills: D3.js, React, and strong analytical thinking.", status: "not-applied"},
    {id: 4, company: "CloudFirst Inc", position: "Backend Developer", location: "Seattle, WA", type: "Full-time", salary: "$140,000 - $190,000", description: "Design and maintain scalable backend systems using Python and AWS. Work with modern DevOps practices and cloud infrastructure.", status: "not-applied"},
    {id: 5, company: "Innovation Labs", position: "UI/UX Engineer", location: "Austin, TX", type: "Full-time", salary: "$110,000 - $150,000", description: "Create beautiful and functional user interfaces for our suite of products. Strong design skills and frontend development expertise required.", status: "not-applied"},
    {id: 6, company: "MegaCorp Solutions", position: "JavaScript Developer", location: "New York, NY", type: "Full-time", salary: "$130,000 - $170,000", description: "Build enterprise applications with JavaScript and modern frameworks. We offer competitive compensation, health insurance, and professional development opportunities.", status: "not-applied"},
    {id: 7, company: "StartupXYZ", position: "Full Stack Engineer", location: "Remote", type: "Full-time", salary: "$120,000 - $160,000", description: "Join our fast-growing startup and work on our core platform. Experience with Node.js and React required. Great benefits and equity package included.", status: "not-applied"},
    {id: 8, company: "TechCorp Industries", position: "Senior Frontend Developer", location: "San Francisco, CA", type: "Full-time", salary: "$130,000 - $175,000", description: "We are looking for an experienced Frontend Developer to build scalable web applications using React and TypeScript. You will work with a talented team on cutting-edge projects.", status: "not-applied"}
];

let currentFilter = 'all';

function displayJobs() {
    const container = document.getElementById('jobs-container');
    container.innerHTML = '';
    
    let filteredJobs = jobs;
    if (currentFilter === 'interview') {
        filteredJobs = jobs.filter(j => j.status === 'interview');
    } else if (currentFilter === 'rejected') {
        filteredJobs = jobs.filter(j => j.status === 'rejected');
    }
    
    if (filteredJobs.length === 0) {
        container.innerHTML = '<div class="text-center py-16 md:py-20 bg-white border rounded"><img src="jobs.png" class="w-16 md:w-20 mx-auto mb-4 opacity-50"><h3 class="text-xl md:text-2xl font-bold mb-2">No jobs available</h3><p class="text-sm md:text-base text-gray-600">Check back soon for new job opportunities</p></div>';
        document.getElementById('jobs-count').innerText = '0';
        return;
    }
    
    document.getElementById('jobs-count').innerText = filteredJobs.length;
    
    for (const job of filteredJobs) {
        const card = document.createElement('div');
        card.className = 'bg-white border rounded p-4 md:p-6 mb-4';
        card.setAttribute('data-id', job.id);
        
        let statusBadge = '';
        if (job.status === 'interview') {
            statusBadge = '<span class="px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded">INTERVIEW</span>';
        } else if (job.status === 'rejected') {
            statusBadge = '<span class="px-2 py-1 bg-red-100 text-red-700 text-xs font-bold rounded">REJECTED</span>';
        } else {
            statusBadge = '<span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded">NOT APPLIED</span>';
        }
        
        let interviewBtn = job.status !== 'interview' ? '<button class="interview-btn px-3 md:px-4 py-2 border-2 border-green-500 text-green-500 rounded font-bold text-xs md:text-sm hover:bg-green-50">INTERVIEW</button>' : '';
        let rejectedBtn = job.status !== 'rejected' ? '<button class="rejected-btn px-3 md:px-4 py-2 border-2 border-red-500 text-red-500 rounded font-bold text-xs md:text-sm hover:bg-red-50">REJECTED</button>' : '';
        
        card.innerHTML = '<div class="flex justify-between items-start mb-2"><div><h3 class="font-bold text-base md:text-lg">' + job.company + '</h3><p class="text-sm md:text-base text-gray-600">' + job.position + '</p></div><button class="delete-btn text-red-500 hover:bg-red-50 p-2 rounded">✕</button></div><p class="text-xs md:text-sm text-gray-500 mb-2">' + job.location + ' • ' + job.type + ' • ' + job.salary + '</p><div class="mb-2">' + statusBadge + '</div><p class="text-xs md:text-sm text-gray-700 mb-4">' + job.description + '</p><div class="flex gap-2">' + interviewBtn + rejectedBtn + '</div>';
        
        container.appendChild(card);
    }
    
    updateCounts();
}

function updateCounts() {
    document.getElementById('total-count').innerText = jobs.length;
    document.getElementById('interview-count').innerText = jobs.filter(j => j.status === 'interview').length;
    document.getElementById('rejected-count').innerText = jobs.filter(j => j.status === 'rejected').length;
}

document.getElementById('btn-all').addEventListener('click', function() {
    currentFilter = 'all';
    document.getElementById('btn-all').className = 'px-4 md:px-6 py-2 bg-blue-500 text-white rounded font-bold text-xs md:text-sm';
    document.getElementById('btn-interview').className = 'px-4 md:px-6 py-2 bg-white border rounded font-bold text-xs md:text-sm';
    document.getElementById('btn-rejected').className = 'px-4 md:px-6 py-2 bg-white border rounded font-bold text-xs md:text-sm';
    displayJobs();
});

document.getElementById('btn-interview').addEventListener('click', function() {
    currentFilter = 'interview';
    document.getElementById('btn-all').className = 'px-4 md:px-6 py-2 bg-white border rounded font-bold text-xs md:text-sm';
    document.getElementById('btn-interview').className = 'px-4 md:px-6 py-2 bg-blue-500 text-white rounded font-bold text-xs md:text-sm';
    document.getElementById('btn-rejected').className = 'px-4 md:px-6 py-2 bg-white border rounded font-bold text-xs md:text-sm';
    displayJobs();
});

document.getElementById('btn-rejected').addEventListener('click', function() {
    currentFilter = 'rejected';
    document.getElementById('btn-all').className = 'px-4 md:px-6 py-2 bg-white border rounded font-bold text-xs md:text-sm';
    document.getElementById('btn-interview').className = 'px-4 md:px-6 py-2 bg-white border rounded font-bold text-xs md:text-sm';
    document.getElementById('btn-rejected').className = 'px-4 md:px-6 py-2 bg-blue-500 text-white rounded font-bold text-xs md:text-sm';
    displayJobs();
});

document.getElementById('jobs-container').addEventListener('click', function(event) {
    const card = event.target.closest('[data-id]');
    if (!card) return;
    
    const jobId = parseInt(card.getAttribute('data-id'));
    const job = jobs.find(j => j.id === jobId);
    
    if (event.target.classList.contains('interview-btn')) {
        job.status = 'interview';
        displayJobs();
    }
    
    if (event.target.classList.contains('rejected-btn')) {
        job.status = 'rejected';
        displayJobs();
    }
    
    if (event.target.classList.contains('delete-btn')) {
        const index = jobs.findIndex(j => j.id === jobId);
        jobs.splice(index, 1);
        displayJobs();
    }
});

displayJobs();
    </script>

</body>
</html>
